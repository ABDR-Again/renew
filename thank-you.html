<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | RENEW Pain &amp; Wellness</title>
<meta name="description" content="Your request has been received by RENEW Pain &amp; Wellness Center.">
<link rel="icon" type="image/webp" href="./assets/optimize/favicon.webp">
<link rel="preload" href="./assets/fonts/outfit-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="./src/critical.css">
<link rel="stylesheet" href="./src/style.css">
<script type="module" src="./src/thank-you.js"></script>
</head>
<body class="thank-you-page">
  <header class="thank-you-header">
    <div class="container">
      <a class="brand" href="/" aria-label="Return to the RENEW landing page">
        <span class="brand-logo-frame" aria-hidden="true">
          <img class="brand-logo" src="./assets/optimize/logo.webp" alt="" width="160" height="89" decoding="async">
        </span>
      </a>
    </div>
  </header>

  <main class="thank-you-main">
    <div class="container">
      <section class="thank-you-card" aria-labelledby="thank-you-heading">
        <svg class="success-icon" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="28"/>
          <path d="M19 32.5 28 41l17-19"/>
        </svg>
        <div class="thank-you-copy" role="status" aria-live="polite">
          <h1 class="display" id="thank-you-heading">Thank You</h1>
          <p class="thank-you-message">Your request has been received. A member of the RENEW Pain &amp; Wellness team will contact you soon.</p>
          <p class="thank-you-message">You will be redirected back to the main page in a few seconds.</p>
          <p class="thank-you-countdown" id="redirectCountdown">Returning to the main page in 5 seconds.</p>
          <div class="thank-you-actions">
            <a class="btn-bracket" href="/">Return to the landing page</a>
          </div>
          <p class="thank-you-call">Need immediate assistance? <a href="tel:+19542569422">Call (954) 256-9422</a></p>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
